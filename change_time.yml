---
- name: Manually set system time
  hosts: all
  become: true
  tasks:
    - name: Disable NTP synchronization
      ansible.builtin.command: timedatectl set-ntp false
      # This prevents automatic updates from overriding your manual setting

    - name: Set system date and time
      ansible.builtin.command: timedatectl set-time "2026-03-23 18:10:00"
      # Format: "YYYY-MM-DD HH:MM:SS"
        
    - name: Enable NTP synchronization
      ansible.builtin.command: timedatectl set-ntp true
      # This prevents automatic updates from overriding your manual setting
      when: time_sync 
